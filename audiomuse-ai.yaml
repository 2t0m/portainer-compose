services:
  redis:
    image: redis:7-alpine
    container_name: audiomuse-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ${DOCKER_DATA_PATH}/audiomuse/redis-data:/data
    networks:
      - audiomuse-network

  postgres:
    image: postgres:15-alpine
    container_name: audiomuse-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-audiomuse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-audiomusepassword}
      POSTGRES_DB: audiomusedb
    volumes:
      - ${DOCKER_DATA_PATH}/audiomuse/postgres-data:/var/lib/postgresql/data
    networks:
      - audiomuse-network

  audiomuse-ai-flask:
    image: ghcr.io/neptunehub/audiomuse-ai:latest-noavx2
    container_name: audiomuse-ai-flask-app
    restart: unless-stopped
    user: root
    command: >
      sh -c "apt-get update && apt-get install -y wget gnupg2 lsb-release &&
      wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | apt-key add - &&
      echo 'deb http://apt.postgresql.org/pub/repos/apt/ bullseye-pgdg main' > /etc/apt/sources.list.d/pgdg.list &&
      apt-get update && apt-get install -y postgresql-client-15 &&
      /usr/bin/tini -- /app/entrypoint.sh"
    ports:
      - "${AUDIOMUSEAI_PORT:-8000}:8000"
    environment:
      SERVICE_TYPE: flask
      TZ: ${TZ:-UTC}
      AUTH_ENABLED: false
      MEDIASERVER_TYPE: navidrome
      NAVIDROME_URL: ${NAVI_INTERNAL_URL}
      NAVIDROME_USER: ${NAVIDROME_USER}
      NAVIDROME_PASSWORD: ${NAVIDROME_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER:-audiomuse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-audiomusepassword}
      POSTGRES_DB: audiomusedb
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      TEMP_DIR: /app/temp_audio
    volumes:
      - ${DOCKER_DATA_PATH}/audiomuse/temp-audio-flask:/app/temp_audio
      - ${MUSIC_PATH}:/music:ro
    depends_on:
      - redis
      - postgres
    networks:
      - audiomuse-network
      - navidrome-network

  audiomuse-ai-worker:
    image: ghcr.io/neptunehub/audiomuse-ai:latest-noavx2
    container_name: audiomuse-ai-worker-instance
    restart: unless-stopped
    environment:
      SERVICE_TYPE: worker
      MEDIASERVER_TYPE: navidrome
      NAVIDROME_URL: ${NAVI_INTERNAL_URL}
      NAVIDROME_USER: ${NAVIDROME_USER}
      NAVIDROME_PASSWORD: ${NAVIDROME_PASSWORD}
      TZ: ${TZ:-UTC}
      POSTGRES_USER: ${POSTGRES_USER:-audiomuse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-audiomusepassword}
      POSTGRES_DB: audiomusedb
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      TEMP_DIR: /app/temp_audio
    volumes:
      - ${DOCKER_DATA_PATH}/audiomuse/temp-audio-worker:/app/temp_audio
      - ${MUSIC_PATH}:/music:ro
    depends_on:
      - redis
      - postgres
    networks:
      - audiomuse-network
      - navidrome-network

networks:
  audiomuse-network:
    driver: bridge
  navidrome-network:
    name: portainer-compose_navidrome-network
    external: true