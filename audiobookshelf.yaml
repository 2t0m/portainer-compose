services:
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    container_name: audiobookshelf
    restart: unless-stopped
    ports:
      - "${AUDIOBOOKSHELF_PORT:-13378}:80"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    volumes:
      - ${AUDIOBOOK_PATH}:/audiobooks
      - ${EBOOK_PATH}:/ebooks
      - ${PODCAST_PATH}:/podcasts
      - ${DOCKER_DATA_PATH}/audiobookshelf/metadata:/metadata
      - ${DOCKER_DATA_PATH}/audiobookshelf/config:/config